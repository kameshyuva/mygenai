# fluent.conf

# Accept logs from Docker
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# Process logs tagged with "docker.*"
<match docker.**>
  @type file
  # This path is inside the Fluentd container, mapped to your ./logs folder
  path /fluentd/log/docker-logs
  append true
  <format>
    @type json
  </format>
  # Buffer settings to ensure logs are written to disk quickly for local testing
  <buffer>
    @type file
    path /fluentd/log/buffer
    flush_mode interval
    flush_interval 5s
  </buffer>
</match>
