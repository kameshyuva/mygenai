services:
  # 1. The Fluentd Log Collector
  fluentd:
    image: fluent/fluentd:v1.16-1
    container_name: fluentd-logger
    ports:
      # Expose port 24224 to the host so the Docker daemon can send logs to it
      - "24224:24224"
      - "24224:24224/udp"
    volumes:
      # Mount the config file and the local logs directory
      - ./fluent.conf:/fluentd/etc/fluent.conf
      - ./logs:/fluentd/log

  # 2. Your Application
  web:
    image: nginx:alpine
    container_name: my-web-app
    ports:
      - "8080:80"
    depends_on:
      # Ensure Fluentd starts before the web app tries to send logs
      - fluentd
    logging:
      driver: "fluentd"
      options:
        # The Docker daemon on the host routes the logs, so it connects to localhost
        fluentd-address: "127.0.0.1:24224"
        tag: "docker.{{.Name}}"
        # Prevents the container from crashing if Fluentd restarts
        fluentd-async-connect: "true" 
