version: '3.8'

services:
  # 1. The Init Container: Has internet, downloads models, then exits
  model-downloader:
    image: ollama/ollama
    container_name: ollama-downloader
    networks:
      - default 
    volumes:
      - ollama_data:/root/.ollama
    # Define your models here. Separate multiple models with a space.
    environment:
      - MODELS=llama3
    command: >
      sh -c "ollama serve & 
      sleep 5 && 
      for model in $$MODELS; do ollama pull $$model; done && 
      echo 'Downloads complete. Exiting.' && exit 0"

  # 2. The Air-Gapped Ollama Instance
  ollama:
    image: ollama/ollama
    container_name: ollama-secure
    # Strictly isolated network; zero outbound internet access
    networks:
      - offline-net
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Waits for the downloader to finish successfully before starting
    depends_on:
      model-downloader:
        condition: service_completed_successfully

  # 3. The Proxy: Allows your host machine to securely talk to Ollama
  proxy:
    image: alpine:latest
    container_name: ollama-proxy
    # Uses socat to forward traffic to the isolated network
    command: >
      sh -c "apk add --no-cache socat && 
      socat tcp-listen:11434,fork,reuseaddr tcp-connect:ollama:11434"
    ports:
      # Exposes Ollama strictly to localhost. 
      # (Change to "11434:11434" if you want full local network access)
      - "127.0.0.1:11434:11434"
    networks:
      - offline-net
      - default
    depends_on:
      - ollama
    restart: unless-stopped

  # 4. Your AI Agent API
  ai-agent:
    build: .
    container_name: local-react-agent
    ports:
      # Exposes your FastAPI agent to other services on port 8000
      - "8000:8000"
    networks:
      # Connects to the offline network to talk to Ollama 
      # Connects to default so other services can reach the API
      - offline-net
      - default
    environment:
      # CORRECTED: Uses internal DNS to point to the 'ollama' service name
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

networks:
  offline-net:
    internal: true # This flag mathematically guarantees no outbound internet access
  default:

volumes:
  ollama_data:
