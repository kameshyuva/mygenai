events {
    # Sets the maximum number of simultaneous connections that can be opened by a worker process
    worker_connections 1024;
}

http {
    # ALLOW CUSTOM HEADERS WITH UNDERSCORES
    # This ensures headers like `X_Custom_Header` are passed to FastAPI
    underscores_in_headers on;

    # HTTP SERVER BLOCK: Redirect all HTTP traffic to HTTPS
    server {
        listen 80;
        server_name localhost;
        
        # 301 Permanent Redirect to the HTTPS version of the requested URI
        return 301 https://$host$request_uri;
    }

    # HTTPS SERVER BLOCK
    server {
        listen 443 ssl;
        server_name localhost;

        # SSL Certificate paths (mapped via docker-compose volumes)
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Recommended SSL/TLS settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # --------------------------------------------------------
        # 1. STANDARD ENDPOINTS (Buffered)
        # --------------------------------------------------------
        location / {
            # Route traffic to the FastAPI container (named 'api' in docker-compose)
            proxy_pass http://api:8000;
            
            # Pass standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --------------------------------------------------------
        # 2. STREAMING ENDPOINTS (Unbuffered)
        #    Use this for Server-Sent Events (SSE), large files, 
        #    or real-time LLM token generation.
        # --------------------------------------------------------
        location /stream {
            proxy_pass http://api:8000;

            # Pass standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CRITICAL STREAMING DIRECTIVES
            
            # Turn off buffering to send data to the client immediately
            proxy_buffering off;
            proxy_cache off;

            # Force HTTP/1.1 (Required for chunked transfer encoding)
            proxy_http_version 1.1;
            
            # Clear the "Connection" header to keep the connection open
            proxy_set_header Connection "";

            # Increase timeouts to prevent Nginx from dropping long-running streams
            # 3600s = 1 hour. Adjust based on your maximum stream duration.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
