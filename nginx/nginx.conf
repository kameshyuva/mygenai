# Load the headers-more module dynamically so we can strip the Server header
load_module /usr/lib/nginx/modules/ngx_http_headers_more_filter_module.so;

events {
    # Sets the maximum number of simultaneous connections that can be opened by a worker process
    worker_connections 1024;
}

http {
    # --------------------------------------------------------
    # CUSTOM HEADER SETTINGS
    # --------------------------------------------------------
    # Allows custom headers with underscores (e.g., X_Custom_Header) to be passed to FastAPI
    underscores_in_headers on;

    # --------------------------------------------------------
    # SECURITY DIRECTIVES
    # --------------------------------------------------------
    # Completely removes the "Server" header from all responses
    more_clear_headers 'Server'; 

    # Fallback/standard directive to hide the Nginx version number
    server_tokens off;

    # Prevent clickjacking by restricting where the site can be embedded in an iframe
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Disable content-type sniffing on some browsers (prevents MIME confusion attacks)
    add_header X-Content-Type-Options "nosniff" always;

    # Enable cross-site scripting (XSS) filter built into modern web browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # Control how much referrer information should be included with requests
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Strict Transport Security (HSTS) - Forces browsers to exclusively use HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content Security Policy (CSP) restricting resources to the same origin
    add_header Content-Security-Policy "default-src 'self';" always;

    # Limit maximum allowed size of the client request body (mitigates DDoS via large uploads)
    client_max_body_size 10M;

    # --------------------------------------------------------
    # SERVER BLOCKS
    # --------------------------------------------------------

    # HTTP Server: Redirect all HTTP traffic to HTTPS
    server {
        listen 80;
        server_name localhost;
        
        # 301 Permanent Redirect
        return 301 https://$host$request_uri;
    }

    # HTTPS Server: Proxy traffic to FastAPI
    server {
        listen 443 ssl;
        server_name localhost;

        # SSL Certificate paths (mapped via docker-compose volume)
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Recommended SSL/TLS settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # --------------------------------------------------------
        # 1. STANDARD ENDPOINTS (Buffered)
        # --------------------------------------------------------
        location / {
            # Route traffic to the FastAPI container
            proxy_pass http://api:8000;
            
            # Pass standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --------------------------------------------------------
        # 2. STREAMING ENDPOINTS (Unbuffered)
        #    Use for Server-Sent Events (SSE) or large file downloads
        # --------------------------------------------------------
        location /stream {
            # Route traffic to the FastAPI container
            proxy_pass http://api:8000;

            # Pass standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CRITICAL STREAMING DIRECTIVES
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
