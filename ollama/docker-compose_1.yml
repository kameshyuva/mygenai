services:
  ollama-secure:
    image: ollama/ollama:latest
    container_name: ollama-secure
    restart: unless-stopped
    
    # --- CPU Pinning ---
    # Strictly isolates execution to the 8 physical cores to maximize L3 cache hits
    cpuset-cpus: "0-7"
    
    environment:
      # --- Concurrency & Queue Management ---
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_QUEUE=1024
      - OLLAMA_MAX_LOADED_MODELS=3
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_HOST=0.0.0.0
      
      # --- Memory, Cache & Context Optimizations ---
      - OLLAMA_NO_MMAP=1
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      # Enforces a strict global ceiling to prevent memory saturation 
      - OLLAMA_CONTEXT_LENGTH=4096
      
    ulimits:
      # Required OS permissions to allow `--mlock` via API
      memlock:
        soft: -1
        hard: -1
        
    volumes:
      - ollama_data:/root/.ollama
      
    ports:
      - "11434:11434"
      
    networks:
      - ai_proxy_network

    # Routes metadata to the logging stack
    logging:
      driver: "fluentd"
      options:
        fluentd-address: localhost:24224 
        tag: ollama.inference

volumes:
  ollama_data:

networks:
  ai_proxy_network:
    driver: bridge
